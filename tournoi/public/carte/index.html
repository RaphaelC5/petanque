<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terrains de pétanque en France</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="map"></div>

  <!-- ── Top bar : search + filters + view toggle ── -->
  <div id="top-bar">

    <div id="search-box">
      <form id="search-form" autocomplete="off">
        <input type="text" id="search-input"
               placeholder="Adresse, ville…"
               aria-label="Rechercher une adresse"
               aria-autocomplete="list"
               aria-controls="autocomplete-list">
        <button id="locate-btn" type="button"
                title="Ma position actuelle" aria-label="Utiliser ma position">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11"/>
          </svg>
        </button>
        <button id="filter-btn" type="button"
                title="Filtrer les terrains" aria-label="Filtres" aria-expanded="false">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="6" x2="20" y2="6"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
            <line x1="11" y1="18" x2="13" y2="18"/>
          </svg>
          <span id="filter-badge" class="hidden"></span>
        </button>
        <button type="submit" id="search-btn" aria-label="Lancer la recherche">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </form>

      <!-- Autocomplete dropdown -->
      <ul id="autocomplete-list" class="hidden" role="listbox" aria-label="Suggestions d'adresses"></ul>

      <!-- Filter panel -->
      <div id="filter-panel" class="hidden">
        <div class="filter-group">
          <div class="filter-group-title">Type de terrain</div>
          <label class="filter-check">
            <input type="checkbox" name="ftype" value="Terrain de pétanque">
            Terrain de pétanque
          </label>
          <label class="filter-check">
            <input type="checkbox" name="ftype" value="Terrain de boules">
            Terrain de boules
          </label>
          <label class="filter-check">
            <input type="checkbox" name="ftype" value="Terrain de boules traditionnelles">
            Boules traditionnelles
          </label>
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Nature</div>
          <label class="filter-check">
            <input type="checkbox" name="fnature" value="Découvert">
            Découvert (extérieur)
          </label>
          <label class="filter-check">
            <input type="checkbox" name="fnature" value="Intérieur">
            Intérieur
          </label>
          <label class="filter-check">
            <input type="checkbox" name="fnature" value="Couvert">
            Couvert
          </label>
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Accès</div>
          <label class="filter-check">
            <input type="checkbox" id="filter-public">
            Ouvert au public
          </label>
          <label class="filter-check">
            <input type="checkbox" id="filter-libre">
            Accès libre (sans réservation)
          </label>
        </div>
        <div class="filter-actions">
          <button type="button" id="filter-reset-btn">Réinitialiser</button>
          <button type="button" id="filter-apply-btn">Appliquer</button>
        </div>
      </div>

      <div id="search-error"></div>
    </div><!-- /#search-box -->

    <!-- View toggle -->
    <div id="view-toggle">
      <button id="btn-map-view" class="view-btn active" title="Vue carte">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
          <line x1="8" y1="2" x2="8" y2="18"/>
          <line x1="16" y1="6" x2="16" y2="22"/>
        </svg>
        <span>Carte</span>
      </button>
      <button id="btn-list-view" class="view-btn" title="Vue liste">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span>Liste</span>
      </button>
    </div>

  </div><!-- /#top-bar -->

  <!-- ── List view (overlay) ── -->
  <div id="list-view" class="hidden">
    <div id="list-header">
      <span id="list-count">–</span>
      <small>Triés par distance du centre de la carte</small>
    </div>
    <div id="list-container">
      <div id="list-sentinel"></div>
    </div>
  </div>

  <!-- ── Sync box (bottom-right) ── -->
  <div id="sync-box">
    <div id="sync-info">
      <span id="sync-label">Dernière synchro :</span>
      <span id="sync-date">–</span>
    </div>
    <div id="sync-actions">
      <button id="update-btn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        <span>Mettre à jour</span>
      </button>
      <button id="add-btn" type="button" title="Ajouter un terrain (ou double-clic sur la carte)">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Add terrain modal ── -->
  <div id="add-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="add-modal-title">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <button class="modal-close" id="add-modal-close" type="button" aria-label="Fermer">×</button>
      <h2 id="add-modal-title">Ajouter un terrain de pétanque</h2>
      <form id="add-form">
        <div class="form-row">
          <label for="f-inst_nom">Nom de l'installation <span class="req">*</span></label>
          <input type="text" id="f-inst_nom" name="inst_nom" required maxlength="120"
                 placeholder="Ex : Boulodrome municipal">
        </div>
        <div class="form-row">
          <label for="f-equip_nom">Nom de l'équipement</label>
          <input type="text" id="f-equip_nom" name="equip_nom" maxlength="120"
                 placeholder="Ex : Terrain n°2">
        </div>
        <div class="form-row">
          <label for="f-inst_adresse">Adresse</label>
          <input type="text" id="f-inst_adresse" name="inst_adresse" maxlength="200"
                 placeholder="Ex : 12 rue des Boules">
        </div>
        <div class="form-row form-grid-2">
          <div>
            <label for="f-inst_cp">Code postal</label>
            <input type="text" id="f-inst_cp" name="inst_cp" maxlength="10"
                   inputmode="numeric" placeholder="75001">
          </div>
          <div>
            <label for="f-new_name">Ville</label>
            <input type="text" id="f-new_name" name="new_name" maxlength="120" placeholder="Paris">
          </div>
        </div>
        <div class="form-row form-grid-2">
          <div>
            <label for="f-equip_type_name">Type</label>
            <select id="f-equip_type_name" name="equip_type_name">
              <option value="Terrain de pétanque">Terrain de pétanque</option>
              <option value="Terrain de boules">Terrain de boules</option>
              <option value="Terrain de boules traditionnelles">Boules traditionnelles</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
          <div>
            <label for="f-equip_nature">Nature</label>
            <select id="f-equip_nature" name="equip_nature">
              <option value="">— Inconnu —</option>
              <option value="Découvert">Découvert (extérieur)</option>
              <option value="Intérieur">Intérieur</option>
              <option value="Couvert">Couvert</option>
            </select>
          </div>
        </div>
        <div class="form-row form-grid-2">
          <div>
            <label for="f-equip_sol">Sol</label>
            <select id="f-equip_sol" name="equip_sol">
              <option value="">— Inconnu —</option>
              <option value="Sable">Sable</option>
              <option value="Stabilisé/cendrée">Stabilisé / cendrée</option>
              <option value="Terre battue">Terre battue</option>
              <option value="Surface naturelle">Surface naturelle</option>
              <option value="Synthétique (hors gazon)">Synthétique</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
          <div>
            <label for="f-equip_surf">Surface (m²)</label>
            <input type="number" id="f-equip_surf" name="equip_surf" min="0" step="1" placeholder="120">
          </div>
        </div>
        <div class="form-row form-grid-2">
          <div>
            <label for="f-equip_haut">Hauteur (m)</label>
            <input type="number" id="f-equip_haut" name="equip_haut" min="0" step="0.1" placeholder="2.5">
          </div>
          <div>
            <label for="f-equip_prop_type">Propriétaire</label>
            <select id="f-equip_prop_type" name="equip_prop_type">
              <option value="">— Inconnu —</option>
              <option value="Commune">Commune</option>
              <option value="Département">Département</option>
              <option value="Région">Région</option>
              <option value="Établissement privé commercial">Privé commercial</option>
              <option value="Association">Association</option>
              <option value="Particulier">Particulier</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
        </div>
        <div class="form-row form-checks">
          <label class="checkbox">
            <input type="checkbox" id="f-equip_ouv_public_bool" name="equip_ouv_public_bool">
            Ouvert au public
          </label>
          <label class="checkbox">
            <input type="checkbox" id="f-equip_acc_libre" name="equip_acc_libre">
            Accès libre (sans réservation)
          </label>
        </div>
        <div id="add-form-coords" class="coords-info"></div>
        <div id="add-form-error" class="form-error"></div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="add-form-cancel">Annuler</button>
          <button type="submit" class="btn-primary">Ajouter le terrain</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Loading overlay ── -->
  <div id="loading-overlay" class="hidden">
    <div class="loading-box">
      <div class="spinner"></div>
      <div id="loading-text">Chargement des terrains de pétanque…</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terrains de pétanque en France</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="map"></div>

  <div id="search-box">
    <form id="search-form" autocomplete="off">
      <input
        type="text"
        id="search-input"
        placeholder="Adresse, ville…"
        aria-label="Rechercher une adresse"
      >
      <button type="submit" id="search-btn" aria-label="Rechercher">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </form>
    <div id="search-error"></div>
  </div>

  <div id="sync-box">
    <div id="sync-info">
      <span id="sync-label">Dernière synchro :</span>
      <span id="sync-date">–</span>
    </div>
    <div id="sync-actions">
      <button id="update-btn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        <span>Mettre à jour</span>
      </button>
      <button id="add-btn" type="button" title="Ajouter un terrain (ou double-clic sur la carte)">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>
  </div>

  <div id="add-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="add-modal-title">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <button class="modal-close" id="add-modal-close" type="button" aria-label="Fermer">×</button>
      <h2 id="add-modal-title">Ajouter un terrain de pétanque</h2>
      <form id="add-form">
        <div class="form-row">
          <label for="f-inst_nom">Nom de l'installation <span class="req">*</span></label>
          <input type="text" id="f-inst_nom" name="inst_nom" required maxlength="120" placeholder="Ex : Boulodrome municipal">
        </div>
        <div class="form-row">
          <label for="f-equip_nom">Nom de l'équipement</label>
          <input type="text" id="f-equip_nom" name="equip_nom" maxlength="120" placeholder="Ex : Terrain n°2">
        </div>
        <div class="form-row">
          <label for="f-inst_adresse">Adresse</label>
          <input type="text" id="f-inst_adresse" name="inst_adresse" maxlength="200" placeholder="Ex : 12 rue des Boules">
        </div>
        <div class="form-row form-grid-2">
          <div>
            <label for="f-inst_cp">Code postal</label>
            <input type="text" id="f-inst_cp" name="inst_cp" maxlength="10" inputmode="numeric" pattern="[0-9 ]*" placeholder="75001">
          </div>
          <div>
            <label for="f-new_name">Ville</label>
            <input type="text" id="f-new_name" name="new_name" maxlength="120" placeholder="Paris">
          </div>
        </div>
        <div class="form-row form-grid-2">
          <div>
            <label for="f-equip_type_name">Type</label>
            <select id="f-equip_type_name" name="equip_type_name">
              <option value="Terrain de pétanque">Terrain de pétanque</option>
              <option value="Terrain de boules">Terrain de boules</option>
              <option value="Terrain de boules traditionnelles">Terrain de boules traditionnelles</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
          <div>
            <label for="f-equip_nature">Nature</label>
            <select id="f-equip_nature" name="equip_nature">
              <option value="">— Inconnu —</option>
              <option value="Découvert">Découvert (extérieur)</option>
              <option value="Intérieur">Intérieur</option>
              <option value="Couvert">Couvert</option>
            </select>
          </div>
        </div>
        <div class="form-row form-grid-2">
          <div>
            <label for="f-equip_sol">Sol</label>
            <select id="f-equip_sol" name="equip_sol">
              <option value="">— Inconnu —</option>
              <option value="Sable">Sable</option>
              <option value="Stabilisé/cendrée">Stabilisé / cendrée</option>
              <option value="Terre battue">Terre battue</option>
              <option value="Surface naturelle">Surface naturelle</option>
              <option value="Synthétique (hors gazon)">Synthétique</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
          <div>
            <label for="f-equip_surf">Surface (m²)</label>
            <input type="number" id="f-equip_surf" name="equip_surf" min="0" step="1" placeholder="120">
          </div>
        </div>
        <div class="form-row form-grid-2">
          <div>
            <label for="f-equip_haut">Hauteur (m)</label>
            <input type="number" id="f-equip_haut" name="equip_haut" min="0" step="0.1" placeholder="2.5">
          </div>
          <div>
            <label for="f-equip_prop_type">Propriétaire</label>
            <select id="f-equip_prop_type" name="equip_prop_type">
              <option value="">— Inconnu —</option>
              <option value="Commune">Commune</option>
              <option value="Département">Département</option>
              <option value="Région">Région</option>
              <option value="Établissement privé commercial">Privé commercial</option>
              <option value="Association">Association</option>
              <option value="Particulier">Particulier</option>
              <option value="Autre">Autre</option>
            </select>
          </div>
        </div>
        <div class="form-row form-checks">
          <label class="checkbox">
            <input type="checkbox" id="f-equip_ouv_public_bool" name="equip_ouv_public_bool">
            Ouvert au public
          </label>
          <label class="checkbox">
            <input type="checkbox" id="f-equip_acc_libre" name="equip_acc_libre">
            Accès libre (sans réservation)
          </label>
        </div>
        <div id="add-form-coords" class="coords-info"></div>
        <div id="add-form-error" class="form-error"></div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="add-form-cancel">Annuler</button>
          <button type="submit" class="btn-primary">Ajouter le terrain</button>
        </div>
      </form>
    </div>
  </div>

  <div id="loading-overlay" class="hidden">
    <div class="loading-box">
      <div class="spinner"></div>
      <div id="loading-text">Chargement des terrains de pétanque…</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
</html>
